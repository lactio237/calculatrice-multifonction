<!doctype html>
<html lang="fr">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Calculatrice</title>
	<link rel="stylesheet" href="css/style.css">
	<style>
		/* fallback minimal reset for older setups */
		html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif}
	</style>
</head>
<body>
	<main class="calculator-app">
		<section class="calculator">
			<div class="display">
				<div id="historyPreview" class="history-preview"></div>
				<div id="output" class="output">0</div>
			</div>
			<div class="keys">
				<button data-action="clear" class="wide">C</button>
				<button data-action="back">⌫</button>
				<button data-action="percent">%</button>
				<button data-action="op">÷</button>

				<button>7</button>
				<button>8</button>
				<button>9</button>
				<button data-action="op">×</button>

				<button>4</button>
				<button>5</button>
				<button>6</button>
				<button data-action="op">−</button>

				<button>1</button>
				<button>2</button>
				<button>3</button>
				<button data-action="op">+</button>

				<button data-action="sign">±</button>
				<button>0</button>
				<button data-action="dot">.</button>
				<button data-action="equals" class="equal">=</button>
			</div>
		</section>

		<aside class="history">
			<div class="history-header">
				<strong>Historique</strong>
				<button id="clearHistory">Effacer</button>
			</div>
			<ul id="historyList" class="history-list"></ul>
		</aside>
	</main>

	<script src="js/app.js" defer></script>
</body>
</html>
